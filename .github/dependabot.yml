# Dependabot VERSION updates (routine "a newer version exists" PRs).
# Tuned for low noise: monthly, grouped into one PR per area, and skipping breaking
# MAJOR upgrades (patch/minor only). Real security fixes are handled separately by
# Dependabot "security updates" (enabled in repo Settings, not here) and are NOT limited
# by this file — a known vulnerability still gets flagged and patched.
version: 2
updates:
  # Frontend npm (apps/web) = the live app. (The root had npm deps only for the legacy
  # TS backend, removed in T08 — so there's no root npm group anymore.)
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 5
    groups:
      web-npm:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: develop
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
