# Dependabot VERSION updates (routine "a newer version exists" PRs).
# Tuned for low noise: monthly, grouped into one PR per area, and skipping breaking
# MAJOR upgrades (patch/minor only). Real security fixes are handled separately by
# Dependabot "security updates" (enabled in repo Settings, not here) and are NOT limited
# by this file — a known vulnerability still gets flagged and patched.
version: 2
updates:
  # NOTE: the frontend npm group (/apps/web) was removed in T60 — the React/Vite SPA was
  # retired (ADR-0013) in favour of the Jinja frontend served by the FastAPI backend, so there
  # is no npm app left to update. Only GitHub Actions and the backend Python deps remain.
  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: develop
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  # Backend Python deps (FastAPI, cryptography, supabase, etc.).
  # Dependabot does not yet support "uv" as an ecosystem — "pip" is the closest
  # supported value and covers packages declared in pyproject.toml. When Dependabot
  # adds native uv support, change ecosystem to "uv" here.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 5
    groups:
      backend-python:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
