name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

# Pinned here so bumping the version is a one-line change, not a hunt through the curl
# command below. Dependabot (github-actions ecosystem) can't track the curl URL, so
# this is the manual equivalent of "version in one place."
env:
  GITLEAKS_VERSION: "8.21.2"

jobs:
  # Backend (FastAPI) tests.
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # --locked fails the build if uv.lock is out of sync with pyproject.toml, instead
      # of silently re-locking (which would hide dependency drift until production).
      - run: uv sync --locked
      - run: uv run pytest -q

  # Analytics tests. T61 makes this explicit because analytics is a separate uv package,
  # so a green backend suite alone does not prove the Python data code still imports/runs.
  analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q

  # NOTE: the React/Vite SPA (apps/web) and its `web` lint/build job were retired in T60
  # (ADR-0013 — the frontend is the Jinja app served by the FastAPI backend). If you re-add a
  # separate JS frontend, restore a build job here AND re-add it to branch protection's required
  # checks.

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The gitleaks-action requires a paid license for GitHub orgs; the gitleaks CLI
      # is free (MIT), so we run it directly. Scans the working tree using the allowlist
      # in .gitleaks.toml.
      - name: Install gitleaks
        # Version is set in the workflow-level env.GITLEAKS_VERSION block above.
        run: curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --no-git --redact --no-banner --exit-code 1
