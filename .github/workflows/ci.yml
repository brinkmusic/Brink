name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  # Backend (FastAPI) tests.
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The gitleaks-action requires a paid license for GitHub orgs; the gitleaks CLI
      # is free (MIT), so we run it directly. Scans the working tree using the allowlist
      # in .gitleaks.toml.
      - name: Install gitleaks
        run: curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --no-git --redact --no-banner --exit-code 1
